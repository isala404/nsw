apiVersion: openchoreo.dev/v1alpha1
metadata:
  name: nsw-oga-ird-portal
endpoints:
  - name: web
    port: 80
    type: HTTP
    visibility:
      - external
connections:
  - component: nsw-oga-ird
    endpoint: api
    visibility: project
    envBindings:
      address: OGA_IRD_URL
configurations:
  env:
    - name: VITE_API_BASE_URL
      value: ""
    - name: VITE_IDP_BASE_URL
      value: http://thunder-service.thunder.svc.cluster.local:8090
    - name: VITE_IDP_CLIENT_ID
      value: OGA_PORTAL_APP_IRD
    - name: VITE_APP_URL
      value: ""
