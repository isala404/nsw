apiVersion: openchoreo.dev/v1alpha1
metadata:
  name: nsw-oga-npqs-portal
endpoints:
  - name: web
    port: 80
    type: HTTP
    visibility:
      - external
connections:
  - component: nsw-oga-npqs
    endpoint: api
    visibility: project
    envBindings:
      address: OGA_NPQS_URL
configurations:
  env:
    - name: VITE_API_BASE_URL
      value: ""
    - name: VITE_IDP_BASE_URL
      value: http://thunder-service.thunder.svc.cluster.local:8090
    - name: VITE_IDP_CLIENT_ID
      value: OGA_PORTAL_APP_NPQS
    - name: VITE_APP_URL
      value: ""
